# Apache reverse proxy for Group 27 Smart Home backend.
#
# Copy this file on the server:
#   sudo cp deploy/apache-smart-home-api.conf /etc/apache2/sites-available/smart-home-api.conf
#   sudo a2enmod proxy proxy_http
#   sudo a2ensite smart-home-api.conf
#   sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName 82.156.238.244

    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api

    ProxyPass /uploads http://127.0.0.1:8000/uploads
    ProxyPassReverse /uploads http://127.0.0.1:8000/uploads

    # CORS is handled by FastAPI CORSMiddleware. Do not add duplicate
    # Access-Control-Allow-* headers here, or browsers will reject local
    # front-end validation with "multiple values '*, *'".

    ErrorLog ${APACHE_LOG_DIR}/smart-home-api-error.log
    CustomLog ${APACHE_LOG_DIR}/smart-home-api-access.log combined
</VirtualHost>

